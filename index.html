<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1261a6" />
    <meta name="description" content="WRO 2026 RoboMission Juniorの練習用・非公式得点計算ツール" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon-192.png" />
    <title>RoboMission Junior 得点計算</title>
  </head>
  <body>
    <div id="app">
      <p style="margin: 0; padding: 2rem; text-align: center; color: #24445f; font: 700 1rem/1.6 system-ui, sans-serif">
        得点表を読み込んでいます…
      </p>
    </div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js", { scope: "./" }).then((registration) => registration.update()).catch(() => {});
        });
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
